# Alembic Configuration File
# Manages PostgreSQL schema migrations for the Core API.

[alembic]
script_location = migrations
prepend_sys_path = .

# Connection string is overridden at runtime by env.py using DATABASE_URL_SYNC.
sqlalchemy.url = postgresql://gsa_user:gsa_local_password@localhost:5432/gsa_core

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
