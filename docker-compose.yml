###############################################################################
# Gemini Sales Accelerator Core — Local Development Stack
#
# Usage:
#   docker compose up          → Start all services (Postgres, Redis, API)
#   docker compose up --build  → Rebuild after requirements.txt changes
#   docker compose down -v     → Tear down + remove volumes
#
# The API container mounts ./api as a volume and runs uvicorn with --reload
# so code changes are picked up instantly without rebuilding.
###############################################################################

services:
  # ─── PostgreSQL 15 ────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: gsa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gsa_user
      POSTGRES_PASSWORD: gsa_local_password
      POSTGRES_DB: gsa_core
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsa_user -d gsa_core"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis 7 (Memorystore locally) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gsa-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── FastAPI Application ──────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gsa-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── ngrok Tunnel (optional) ───────────────────────────────────────────
  # Exposes the API to the internet for Google Sheets / webhook testing.
  # Set NGROK_AUTHTOKEN in .env to enable. Get yours at: https://ngrok.com
  ngrok:
    image: ngrok/ngrok:latest
    container_name: gsa-ngrok
    restart: unless-stopped
    profiles:
      - tunnel
    ports:
      - "4040:4040"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
      NGROK_DOMAIN: ${NGROK_DOMAIN:-}
    entrypoint: /bin/sh
    command: >
      -c "if [ -n \"$$NGROK_DOMAIN\" ]; then
        ngrok http api:8000 --log stdout --domain $$NGROK_DOMAIN;
      else
        ngrok http api:8000 --log stdout;
      fi"
    depends_on:
      - api

volumes:
  pgdata:
    driver: local
